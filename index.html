<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; object-src 'none'; frame-ancestors 'none'"  />
  <title>Earth–Moon Observatory</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { background: radial-gradient(ellipse at center, #050a15 0%, #000005 100%); }
    #canvas { display: block; width: 100%; height: 100%; }

    /* HUD */
    #hud {
      position: fixed; top: 16px; left: 16px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.7;
      min-width: 220px;
      user-select: none;
      backdrop-filter: blur(4px);
    }
    #hud .hud-title {
      font-size: 11px; letter-spacing: 2px;
      color: #aaa; text-transform: uppercase; margin-bottom: 6px;
    }
    #hud .hud-row { display: flex; justify-content: space-between; gap: 12px; }
    #hud .hud-label { color: #888; }
    #hud .hud-value { color: #fff; font-weight: bold; }
    #live-badge {
      display: inline-block;
      width: 8px; height: 8px; border-radius: 50%;
      background: #00ff88; margin-right: 6px;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    #live-badge.hidden { display: none; }

    /* Time Controls */
    #controls {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      user-select: none;
    }
    #speed-label {
      color: #aaa; font-family: 'Courier New', monospace;
      font-size: 12px; letter-spacing: 1px;
    }
    #btn-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; max-width: 95vw; }
    .ctrl-btn {
      background: rgba(0,0,0,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.4); }
    .ctrl-btn.active { background: rgba(0,255,136,0.15); border-color: #00ff88; color: #00ff88; }
    .ctrl-btn.speed-btn { transition: opacity 0.2s, visibility 0.2s; }
    .ctrl-btn.speed-btn.btn-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    /* Responsive */
    @media (max-width: 480px) {
      #hud { font-size: 11px; min-width: 170px; padding: 8px 12px; top: 8px; left: 8px; }
      .ctrl-btn { font-size: 11px; padding: 5px 8px; }
    }

    #focus-indicator {
      position: fixed; top: 16px; right: 16px;
      background: rgba(0,0,0,0.65);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      padding: 8px 14px;
      color: #aaa;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      user-select: none;
      backdrop-filter: blur(4px);
      display: flex; flex-direction: column; gap: 4px;
    }
    #focus-indicator .focus-row {
      display: flex; align-items: center; gap: 8px;
    }
    #focus-indicator .focus-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #00ff88;
    }
    #focus-indicator .focus-name {
      color: #fff; font-weight: bold;
    }
    #focus-indicator .focus-hint {
      font-size: 10px; color: #666;
    }
    @media (max-width: 480px) {
      #focus-indicator { font-size: 11px; top: 8px; right: 8px; padding: 6px 10px; }
    }

    #hud-coords { display: none; border-top: 1px solid rgba(255,255,255,0.08); margin-top: 6px; padding-top: 6px; }
    #hud-coords.visible { display: block; }
    #coords-toggle {
      background: none; border: none; color: #555; font-family: 'Courier New', monospace;
      font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
      cursor: pointer; padding: 4px 0 0; width: 100%; text-align: left;
      transition: color 0.15s;
    }
    #coords-toggle:hover { color: #aaa; }

    #lesson-card {
      position: fixed; bottom: 110px; left: 16px;
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(100,200,255,0.2);
      border-radius: 8px;
      padding: 14px 16px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      line-height: 1.6;
      max-width: 290px;
      user-select: none;
      backdrop-filter: blur(4px);
      display: none;
    }
    #lesson-card.visible { display: block; }
    #lesson-counter { font-size: 10px; color: #555; letter-spacing: 1px; margin-bottom: 4px; }
    #lesson-title   { font-size: 13px; color: #7df; font-weight: bold; margin-bottom: 8px; }
    #lesson-body    { color: #bbb; margin-bottom: 12px; }
    .lesson-nav     { display: flex; gap: 6px; }
    .lesson-nav .ctrl-btn { flex: 1; text-align: center; }
    @media (max-width: 480px) {
      #lesson-card { font-size: 11px; max-width: 230px; bottom: 120px; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-title">Earth–Moon Observatory</div>
    <div class="hud-row">
      <span class="hud-label"><span id="live-badge"></span>Time (UTC)</span>
      <span class="hud-value" id="hud-time">—</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Distance</span>
      <span class="hud-value" id="hud-dist">—</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Phase</span>
      <span class="hud-value" id="hud-phase">—</span>
    </div>
    <div class="hud-row" style="margin-top:2px;">
      <span class="hud-label" style="font-size:10px;color:#555;">Full phase spans ~3 days</span>
      <span style="font-size:10px;color:#555;" id="hud-fullmoon-in">—</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Peak Full Moon</span>
      <span class="hud-value" id="hud-fullmoon">—</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Speed</span>
      <span class="hud-value" id="hud-speed">—</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Libration</span>
      <span class="hud-value" id="hud-lib">—</span>
    </div>
    <button id="coords-toggle">▶ Ecliptic Coords</button>
    <div id="hud-coords">
      <div class="hud-row">
        <span class="hud-label">Ecl. Lon</span>
        <span class="hud-value" id="hud-lon">—</span>
      </div>
      <div class="hud-row">
        <span class="hud-label">Ecl. Lat</span>
        <span class="hud-value" id="hud-lat">—</span>
      </div>
      <div style="font-size:10px;color:#444;margin-top:4px;">Verify: JPL Horizons #301</div>
    </div>
  </div>

  <!-- Time Controls -->
  <div id="controls">
    <div id="speed-label">LIVE — 1×</div>
    <div id="btn-row">
      <button class="ctrl-btn speed-btn" id="btn-rev3">◀◀◀ 100k×</button>
      <button class="ctrl-btn speed-btn" id="btn-rev2">◀◀ 1000×</button>
      <button class="ctrl-btn speed-btn" id="btn-rev1">◀ 100×</button>
      <button class="ctrl-btn" id="btn-pause">⏸ Pause</button>
      <button class="ctrl-btn speed-btn" id="btn-fwd1">▶ 100×</button>
      <button class="ctrl-btn speed-btn" id="btn-fwd2">▶▶ 1000×</button>
      <button class="ctrl-btn speed-btn" id="btn-fwd3">▶▶▶ 100k×</button>
      <button class="ctrl-btn active" id="btn-live">● LIVE</button>
      <button class="ctrl-btn active" id="btn-orbit">⊙ Orbit</button>
      <button class="ctrl-btn" id="btn-facts" style="display:none">💡 Facts</button>
    </div>
  </div>

  <div id="lesson-card">
    <div id="lesson-counter">1 / 5</div>
    <div id="lesson-title"></div>
    <div id="lesson-body"></div>
    <div class="lesson-nav">
      <button class="ctrl-btn" id="lesson-prev">◀ Prev</button>
      <button class="ctrl-btn" id="lesson-close">✕ Close</button>
      <button class="ctrl-btn" id="lesson-next">Next ▶</button>
    </div>
  </div>

  <div id="focus-indicator">
    <div class="focus-row">
      <div class="focus-dot"></div>
      <span>Focused: <span id="focus-name" class="focus-name">Earth</span></span>
    </div>
    <div class="focus-hint">Click Earth or Moon to switch</div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "/lib/three/three.module.js",
      "three/addons/": "/lib/three/addons/"
    }
  }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ── Scene bootstrap ──────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;

    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100000);
    camera.position.set(0, 20, 80);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 2.5;
    controls.maxDistance = 500;

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // Ambient fill
    scene.add(new THREE.AmbientLight(0x111122, 0.4));

    // ── Astronomy Engine (Meeus Ch. 47) ─────────────────────────────────────────
    const astronomyEngine = {
      toRad: d => d * Math.PI / 180,
      toDeg: r => r * 180 / Math.PI,
      norm: d => ((d % 360) + 360) % 360,

      julianDay(date) {
        let y = date.getUTCFullYear();
        let m = date.getUTCMonth() + 1;
        const d = date.getUTCDate() +
          (date.getUTCHours() * 3600 + date.getUTCMinutes() * 60 + date.getUTCSeconds()) / 86400;
        if (m <= 2) { y--; m += 12; }
        const A = Math.floor(y / 100);
        const B = 2 - A + Math.floor(A / 4);
        return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + B - 1524.5;
      },

      getMoonState(date) {
        const JD  = this.julianDay(date);
        const T   = (JD - 2451545.0) / 36525;
        const T2  = T * T;

        // Fundamental arguments (degrees, normalized 0-360)
        const Lp = this.norm(218.3164477 + 481267.88123421*T - 0.0015786*T2); // Moon mean longitude
        const D  = this.norm(297.8501921 + 445267.1114034 *T - 0.0018819*T2); // Moon mean elongation
        const M  = this.norm(357.5291092 + 35999.0502909  *T - 0.0001536*T2); // Sun mean anomaly
        const Mp = this.norm(134.9633964 + 477198.8675055 *T + 0.0087414*T2); // Moon mean anomaly
        const F  = this.norm(93.2720950  + 483202.0175233 *T - 0.0036539*T2); // Moon arg of latitude
        // Eccentricity correction for solar terms
        const E  = 1 - 0.002516*T - 0.0000074*T2;
        const E2 = E * E;

        const Dr = this.toRad(D), Mr = this.toRad(M), Mpr = this.toRad(Mp), Fr = this.toRad(F);

        // Longitude + distance terms (Meeus Table 45.A)
        // [D, M, M', F, sumL_coeff (x1e-6 deg), sumR_coeff (x0.001 km)]
        const lrTerms = [
          [0, 0, 1, 0,  6288774, -20905355],
          [2, 0,-1, 0,  1274027,  -3699111],
          [2, 0, 0, 0,   658314,  -2955968],
          [0, 0, 2, 0,   213618,   -569925],
          [0, 1, 0, 0,  -185116,     48888],
          [0, 0, 0, 2,  -114332,     -3149],
          [2, 0,-2, 0,    58793,    246158],
          [2,-1,-1, 0,    57066,   -152138],
          [2, 0, 1, 0,    53322,   -170733],
          [2,-1, 0, 0,    45758,   -204586],
          [0, 1,-1, 0,   -40923,   -129620],
          [1, 0, 0, 0,   -34720,    108743],
          [0, 1, 1, 0,   -30383,    104755],
          [2, 0, 0,-2,    15327,     10321],
          [0, 0, 1, 2,   -12528,         0],
          [0, 0, 1,-2,    10980,     79661],
          [4, 0,-1, 0,    10675,    -34782],
          [0, 0, 3, 0,    10034,    -23210],
          [4, 0,-2, 0,     8548,    -21636],
          [2, 1,-1, 0,    -7888,     24208],
          [2, 1, 0, 0,    -6766,     30824],
          [1, 0,-1, 0,    -5163,     -8379],
          [1, 1, 0, 0,     4987,    -16675],
          [2,-1, 1, 0,     4036,    -10034],
          [2, 0, 2, 0,     3994,    -12831],
          [4, 0, 0, 0,     3861,    -10445],
          [2, 0,-3, 0,     3665,    -11650],
          [0, 1,-2, 0,    -2689,     14403],
          [2, 0,-1, 2,    -2602,         0],
          [2,-1,-2, 0,     2390,     10056],
          [1, 0, 1, 0,    -2348,     -8379],
          [2,-2, 0, 0,     2236,     -7003],
          [0, 1, 2, 0,    -2120,         0],
          [0, 2, 0, 0,    -2069,         0],
          [2,-2,-1, 0,     2048,         0],
          [2, 0, 1,-2,    -1773,         0],
          [2, 0, 0, 2,    -1595,         0],
          [4,-1,-1, 0,     1215,         0],
          [0, 0, 2, 2,    -1110,         0],
        ];

        let sumL = 0, sumR = 0;
        for (const [d,m,mp,f, cl, cr] of lrTerms) {
          const arg = d*Dr + m*Mr + mp*Mpr + f*Fr;
          const eCorr = Math.abs(m) === 2 ? E2 : Math.abs(m) === 1 ? E : 1;
          sumL += eCorr * cl * Math.sin(arg);
          sumR += eCorr * cr * Math.cos(arg);
        }
        // Additive longitude corrections
        sumL += 3958 * Math.sin(this.toRad(119.75 + 131.849 * T));
        sumL += 1962 * Math.sin(this.toRad(Lp) - Fr);
        sumL +=  318 * Math.sin(this.toRad(53.09 + 479264.29 * T));

        // Latitude terms (Meeus Table 45.B)
        // [D, M, M', F, sumB_coeff (x1e-6 deg)]
        const bTerms = [
          [0, 0, 0, 1,  5128122],
          [0, 0, 1, 1,   280602],
          [0, 0, 1,-1,   277693],
          [2, 0, 0,-1,   173237],
          [2, 0,-1, 1,    55413],
          [2, 0,-1,-1,    46271],
          [2, 0, 0, 1,    32573],
          [0, 0, 2, 1,    17198],
          [2, 0, 1,-1,     9266],
          [0, 0, 2,-1,     8822],
          [2,-1, 0,-1,     8216],
          [2, 0,-2,-1,     4324],
          [2, 0, 1, 1,     4200],
          [2, 1, 0,-1,    -3359],
          [2,-1,-1, 1,     2463],
          [2,-1, 0, 1,     2211],
          [2,-1,-1,-1,     2065],
          [0, 1,-1,-1,    -1870],
          [4, 0,-1,-1,     1828],
          [0, 1, 0, 1,    -1794],
          [0, 0, 0, 3,    -1749],
          [0, 1,-1, 1,    -1565],
          [1, 0, 0, 1,    -1491],
          [0, 1, 1, 1,    -1475],
          [0, 1, 1,-1,    -1410],
          [0, 1, 0,-1,    -1344],
          [1, 0, 0,-1,    -1335],
          [0, 0, 3, 1,     1107],
          [4, 0, 0,-1,     1021],
          [4, 0,-1, 1,      833],
        ];

        let sumB = 0;
        for (const [d,m,mp,f, cb] of bTerms) {
          const arg = d*Dr + m*Mr + mp*Mpr + f*Fr;
          const eCorr = Math.abs(m) === 2 ? E2 : Math.abs(m) === 1 ? E : 1;
          sumB += eCorr * cb * Math.sin(arg);
        }
        sumB -= 2235 * Math.sin(this.toRad(Lp));
        sumB +=  382 * Math.sin(this.toRad(207.14 + 14712.317 * T));
        sumB +=  175 * Math.sin(this.toRad(119.75 + 131.849 * T) - Fr);
        sumB +=  175 * Math.sin(this.toRad(119.75 + 131.849 * T) + Fr);
        sumB +=  127 * Math.sin(this.toRad(Lp) - Mpr);
        sumB -=  115 * Math.sin(this.toRad(Lp) + Mpr);

        // Geocentric ecliptic coords
        const lon  = this.norm(Lp + sumL / 1e6);  // degrees
        const lat  = sumB / 1e6;                   // degrees
        const dist = 385000.56 + sumR / 1000;      // km

        // 3D position in scene units (1 unit = 10,000 km)
        // Ecliptic frame: XZ plane = ecliptic plane, Y = ecliptic north
        const lonR = this.toRad(lon);
        const latR = this.toRad(lat);
        const r    = dist / 10000;
        const scenePos = new THREE.Vector3(
          r * Math.cos(latR) * Math.cos(lonR),
          r * Math.sin(latR),
         -r * Math.cos(latR) * Math.sin(lonR)
        );

        // Orbital speed (km/s) - vis-viva approximation
        const a = 384400;
        const speed = 1.022 * Math.sqrt(a * (2 / dist - 1 / a));

        // Simplified optical libration in longitude — eccentricity term only (first-order approx, max ~+-3 degrees)
        const e = 0.0549;
        const libration = this.toDeg(Math.atan2(e * Math.sin(Mpr), 1 - e * Math.cos(Mpr)));

        // Sun ecliptic longitude — computed once here so getSunDirection need not be called separately
        const L0_sun = this.norm(280.46646 + 36000.76983 * T);
        const C_sun  = (1.914602 - 0.004817*T) * Math.sin(this.toRad(M))
                     + (0.019993 - 0.000101*T) * Math.sin(2 * this.toRad(M))
                     +  0.000289                * Math.sin(3 * this.toRad(M));
        const sunLon = this.norm(L0_sun + C_sun);
        const sl     = this.toRad(sunLon);
        // sunDir in ecliptic frame (Y=0, XZ = ecliptic plane) — same as getSunDirection()
        const sunDir = new THREE.Vector3(Math.cos(sl), 0, -Math.sin(sl));

        // True elongation (Moon lon − Sun lon) — used for phase labels and full moon finder
        const trueElongation = this.norm(lon - sunLon);

        let phaseName, phaseIcon;
        if      (trueElongation <  22.5) { phaseName = 'New Moon';        phaseIcon = '🌑'; }
        else if (trueElongation <  67.5) { phaseName = 'Waxing Crescent'; phaseIcon = '🌒'; }
        else if (trueElongation < 112.5) { phaseName = 'First Quarter';   phaseIcon = '🌓'; }
        else if (trueElongation < 157.5) { phaseName = 'Waxing Gibbous';  phaseIcon = '🌔'; }
        else if (trueElongation < 202.5) { phaseName = 'Full Moon';       phaseIcon = '🌕'; }
        else if (trueElongation < 247.5) { phaseName = 'Waning Gibbous';  phaseIcon = '🌖'; }
        else if (trueElongation < 292.5) { phaseName = 'Last Quarter';    phaseIcon = '🌗'; }
        else if (trueElongation < 337.5) { phaseName = 'Waning Crescent'; phaseIcon = '🌘'; }
        else                              { phaseName = 'New Moon';        phaseIcon = '🌑'; }

        return { scenePos, distance: dist, speed, libration, phaseName, phaseIcon, lon, lat, sunDir, trueElongation };
      },

      getSunDirection(date) {
        const JD = this.julianDay(date);
        const T  = (JD - 2451545.0) / 36525;
        const L0 = this.norm(280.46646 + 36000.76983 * T);
        const M  = this.norm(357.52911 + 35999.05029 * T);
        const Mr = this.toRad(M);
        const C  = (1.914602 - 0.004817*T) * Math.sin(Mr)
                 + (0.019993 - 0.000101*T) * Math.sin(2*Mr)
                 +  0.000289                * Math.sin(3*Mr);
        const sunLon = this.norm(L0 + C);
        const sl = this.toRad(sunLon);
        return new THREE.Vector3(Math.cos(sl), 0, -Math.sin(sl)).normalize();
      }
    };

    // ── Time Controller ──────────────────────────────────────────────────────
    const timeController = {
      simTime:    Date.now(),
      multiplier: 1,
      isLive:     true,
      paused:     false,
      _lastWall:  Date.now(),

      tick() {
        const now = Date.now();
        const wallDelta = now - this._lastWall;
        this._lastWall = now;
        if (this.isLive) {
          this.simTime = Date.now();
        } else if (!this.paused) {
          this.simTime += wallDelta * this.multiplier;
        }
        return new Date(this.simTime);
      },

      setSpeed(mult) {
        this.isLive     = false;
        this.paused     = false;
        this.multiplier = mult;
        this._lastWall  = Date.now();
      },

      goLive() {
        this.isLive     = true;
        this.paused     = false;
        this.multiplier = 1;
        this.simTime    = Date.now();
        this._lastWall  = Date.now();
      },

      pause() {
        this.isLive    = false;
        this.paused    = !this.paused;
        this._lastWall = Date.now();
      }
    };
    // ── Starfield ────────────────────────────────────────────────────────────
    (function buildStars() {
      const count = 3000;
      const geo   = new THREE.BufferGeometry();
      const pos   = new Float32Array(count * 3);
      const R     = 5000;

      for (let i = 0; i < count; i++) {
        const theta = Math.acos(2 * Math.random() - 1);
        const phi   = 2 * Math.PI * Math.random();
        pos[i*3  ]  = R * Math.sin(theta) * Math.cos(phi);
        pos[i*3+1]  = R * Math.sin(theta) * Math.sin(phi);
        pos[i*3+2]  = R * Math.cos(theta);
      }

      geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));

      const mat = new THREE.PointsMaterial({
        color: 0xffffff,
        size:  0.8,
        sizeAttenuation: false,
        transparent: true,
        opacity: 0.85
      });

      const stars = new THREE.Points(geo, mat);
      stars.matrixAutoUpdate = false;
      stars.updateMatrix();
      scene.add(stars);
    })();
    // ── Earth ────────────────────────────────────────────────────────────────
    const EARTH_RADIUS   = 2.0;
    const EARTH_TILT_RAD = 23.44 * Math.PI / 180;

    const texLoader  = new THREE.TextureLoader();
    texLoader.crossOrigin = 'anonymous';
    const onTexError = (url) => () => console.warn(`Texture failed to load: ${url}`);
    const earthGroup = new THREE.Group();
    earthGroup.rotation.x = -EARTH_TILT_RAD;
    scene.add(earthGroup);

    const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 64, 64);
    const earthMat = new THREE.MeshPhongMaterial({
      map:         texLoader.load('./images/earth_atmos_2048.jpg',    undefined, undefined, onTexError('./images/earth_atmos_2048.jpg')),
      normalMap:   texLoader.load('./images/earth_normal_2048.jpg',   undefined, undefined, onTexError('./images/earth_normal_2048.jpg')),
      normalScale: new THREE.Vector2(0.85, 0.85),
      specularMap: texLoader.load('./images/earth_specular_2048.jpg', undefined, undefined, onTexError('./images/earth_specular_2048.jpg')),
      specular:    new THREE.Color(0x4466aa),
      shininess:   30,
    });
    const earthMesh = new THREE.Mesh(earthGeo, earthMat);
    earthGroup.add(earthMesh);

    // ── Night lights (city glow on dark side) ────────────────────────────────
    const nightTex = texLoader.load('./images/earth_night.jpg', undefined, undefined, onTexError('./images/earth_night.jpg'));
    nightTex.colorSpace = THREE.SRGBColorSpace;
    const nightMat = new THREE.ShaderMaterial({
      uniforms: {
        nightTex: { value: nightTex },
        sunDir:   { value: new THREE.Vector3(1, 0, 0) },
      },
      vertexShader: `
        varying vec2 vUv;
        varying vec3 vWorldNormal;
        void main() {
          vUv = uv;
          vWorldNormal = normalize(mat3(modelMatrix) * normal);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D nightTex;
        uniform vec3 sunDir;
        varying vec2 vUv;
        varying vec3 vWorldNormal;
        void main() {
          float sun = dot(vWorldNormal, sunDir);
          float night = smoothstep(0.1, -0.25, sun);
          vec4 lights = texture2D(nightTex, vUv);
          gl_FragColor = vec4(lights.rgb * night * 2.5, 1.0);
        }
      `,
      blending:   THREE.AdditiveBlending,
      depthWrite: false,
    });
    const nightMesh = new THREE.Mesh(earthGeo, nightMat);
    nightMesh.scale.setScalar(1.001); // tiny offset to avoid z-fighting
    earthMesh.add(nightMesh); // child of earthMesh — inherits GMST rotation automatically

    // Atmosphere halo
    const atmGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.02, 64, 64);
    const atmMat = new THREE.MeshPhongMaterial({
      color:       0x4488ff,
      transparent: true,
      opacity:     0.08,
      side:        THREE.FrontSide,
      blending:    THREE.AdditiveBlending,
      depthWrite:  false,
    });
    earthGroup.add(new THREE.Mesh(atmGeo, atmMat));

    // Sun directional light (position updated each frame)
    const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
    scene.add(sunLight);

    // ── Moon ─────────────────────────────────────────────────────────────────
    const MOON_RADIUS = 0.545;

    const moonGeo  = new THREE.SphereGeometry(MOON_RADIUS, 48, 48);
    const moonTex  = texLoader.load('./images/moon_4k.jpg', undefined, undefined, onTexError('./images/moon_4k.jpg'));
    moonTex.colorSpace = THREE.SRGBColorSpace;
    const moonMat  = new THREE.MeshPhongMaterial({
      map:       moonTex,
      shininess: 5,
      specular:  new THREE.Color(0x111111),
    });
    const moonMesh = new THREE.Mesh(moonGeo, moonMat);
    scene.add(moonMesh);

    const _toEarth  = new THREE.Vector3();
    const _moonQuat = new THREE.Quaternion();
    const _Z_AXIS   = new THREE.Vector3(0, 0, 1); // Moon's local near-side axis

    function updateMoon(state) {
      moonMesh.position.copy(state.scenePos);

      // Tidal lock: rotate Moon so its near-side (+Z local) faces Earth (origin)
      _toEarth.set(0, 0, 0).sub(moonMesh.position).normalize();
      _moonQuat.setFromUnitVectors(_Z_AXIS, _toEarth);
      moonMesh.quaternion.copy(_moonQuat);

      // Apply libration offset around local Y axis
      moonMesh.rotateY(state.libration * Math.PI / 180);
    }
    // ── Orbit Ring (sampled from real Moon positions) ─────────────────────────
    const ORBITAL_PERIOD_MS = 27.32166 * 24 * 3600 * 1000; // one sidereal month

    const orbitGeo = new THREE.BufferGeometry();
    const orbitMat = new THREE.LineBasicMaterial({
      vertexColors: true, transparent: true, depthWrite: false,
    });
    const orbitLine = new THREE.Line(orbitGeo, orbitMat);
    scene.add(orbitLine);

    let _lastOrbitUpdate = 0;   // sim time when orbit was last resampled
    let _lastOrbitWallMs = 0;   // wall time when orbit was last resampled

    function rebuildOrbitRing(centerDate) {
      const samples = 180;
      const pts     = [];
      const colors  = [];

      // Leave a gap centred on the Moon's current position so the ring never
      // visually intersects the Moon body regardless of camera angle.
      const GAP      = 0.05;                          // fraction of orbit left empty (2.5% each side)
      const duration = 1.0 - GAP;                     // fraction of orbit actually drawn
      const start    = centerDate.getTime() + (GAP / 2) * ORBITAL_PERIOD_MS;

      for (let i = 0; i < samples; i++) {
        const t = start + (i / (samples - 1)) * duration * ORBITAL_PERIOD_MS;
        pts.push(astronomyEngine.getMoonState(new Date(t)).scenePos.clone());

        // Symmetric fade-in (first 15%) and fade-out (last 15%) so both ends dissolve well clear of the Moon gap.
        const tNorm = i / (samples - 1);
        const FADE  = 0.15;
        const brightness = tNorm < FADE
          ? 0.55 * (tNorm / FADE)
          : tNorm > (1 - FADE)
            ? 0.55 * ((1 - tNorm) / FADE)
            : 0.55;
        colors.push(brightness, brightness, brightness);
      }

      orbitGeo.setFromPoints(pts);
      orbitGeo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
    }
    // ── Button wiring ────────────────────────────────────────────────────────
    const speedLabel = document.getElementById('speed-label');
    const liveBtn    = document.getElementById('btn-live');

    function setActiveBtn(keepLive = false) {
      // Exclude #btn-orbit — its active state tracks visibility, not speed selection
      document.querySelectorAll('.ctrl-btn:not(#btn-orbit)').forEach(b => b.classList.remove('active'));
      if (keepLive) liveBtn.classList.add('active');
    }

    function applySpeed(mult, label, btn) {
      timeController.setSpeed(mult);
      speedLabel.textContent = label;
      setActiveBtn(false);
      btn.classList.add('active');
    }

    document.getElementById('btn-rev3').addEventListener('click', function() { applySpeed(-100000, '\u25c4\u25c4\u25c4 100,000\u00d7 (reverse)', this); });
    document.getElementById('btn-rev2').addEventListener('click', function() { applySpeed(-1000,   '\u25c4\u25c4 1,000\u00d7 (reverse)', this); });
    document.getElementById('btn-rev1').addEventListener('click', function() { applySpeed(-100,    '\u25c4 100\u00d7 (reverse)', this); });

    document.getElementById('btn-fwd1').addEventListener('click', function() { applySpeed(100,    '\u25ba 100\u00d7', this); });
    document.getElementById('btn-fwd2').addEventListener('click', function() { applySpeed(1000,   '\u25ba\u25ba 1,000\u00d7', this); });
    document.getElementById('btn-fwd3').addEventListener('click', function() { applySpeed(100000, '\u25ba\u25ba\u25ba 100,000\u00d7', this); });

    let _prePauseLabel = 'LIVE \u2014 1\u00d7'; // tracks label in effect before pause

    document.getElementById('btn-pause').addEventListener('click', () => {
      if (!timeController.paused) _prePauseLabel = speedLabel.textContent; // save before pausing
      timeController.pause();
      setActiveBtn(false);
      document.getElementById('btn-pause').classList.add('active');
      speedLabel.textContent = timeController.paused ? '\u23f8 Paused' : _prePauseLabel;
    });

    document.getElementById('btn-live').addEventListener('click', () => {
      timeController.goLive();
      setActiveBtn(true);
      speedLabel.textContent = 'LIVE \u2014 1\u00d7';
    });

    document.getElementById('btn-orbit').addEventListener('click', function() {
      const visible = orbitLine.visible = !orbitLine.visible;
      this.classList.toggle('active', visible);
    });

    // ── Next Full Moon finder ─────────────────────────────────────────────────
    function getTrueElongation(date) {
      // trueElongation is pre-computed inside getMoonState — no extra getSunDirection call needed
      return astronomyEngine.getMoonState(date).trueElongation;
    }

    function findNextFullMoon(fromDate) {
      const stepMs = 6 * 3600 * 1000; // 6-hour scan steps
      let t         = fromDate.getTime();
      let prevElong = getTrueElongation(new Date(t));

      // Advance past current full moon phase if we're inside one
      if (prevElong > 157.5 && prevElong < 202.5) {
        while (prevElong > 157.5 && prevElong < 202.5) {
          t        += stepMs;
          prevElong = getTrueElongation(new Date(t));
        }
      }

      // Scan forward up to 35 days for the next 180° crossing
      for (let i = 0; i < 140; i++) {
        t += stepMs;
        const elong = getTrueElongation(new Date(t));
        if (prevElong < 180 && elong >= 180) {
          // Bisect for ~1-minute precision
          let lo = t - stepMs, hi = t;
          for (let j = 0; j < 40; j++) {
            const mid = (lo + hi) / 2;
            if (getTrueElongation(new Date(mid)) < 180) lo = mid; else hi = mid;
          }
          return new Date((lo + hi) / 2);
        }
        prevElong = elong;
      }
      return null;
    }

    let _cachedFullMoon     = null; // { date: Date, computedAt: number }
    const FULL_MOON_CACHE_MS = 12 * 3600 * 1000; // recompute every 12 sim-hours

    function getNextFullMoon(simDate) {
      if (
        !_cachedFullMoon ||
        Math.abs(simDate.getTime() - _cachedFullMoon.computedAt) > FULL_MOON_CACHE_MS ||
        (_cachedFullMoon.date && simDate.getTime() >= _cachedFullMoon.date.getTime())
      ) {
        _cachedFullMoon = {
          date:       findNextFullMoon(simDate),
          computedAt: simDate.getTime(),
        };
      }
      return _cachedFullMoon.date;
    }

    // ── Focus / click-to-target ───────────────────────────────────────────────
    let focusTarget   = 'earth';                    // 'earth' | 'moon'
    const _lerpTarget = new THREE.Vector3();        // current lerped controls.target
    const _moonTarget = new THREE.Vector3();        // moon position snapshot for lerp
    const _earthOrigin = new THREE.Vector3(0,0,0);

    const raycaster = new THREE.Raycaster();
    const _mouse    = new THREE.Vector2();

    function setSpeedButtonsVisible(visible) {
      document.querySelectorAll('.speed-btn').forEach(btn => {
        btn.classList.toggle('btn-hidden', !visible);
      });
    }

    // Distinguish click from drag: record pointer-down position
    let _pointerDownX = 0, _pointerDownY = 0;

    canvas.addEventListener('pointerdown', e => {
      _pointerDownX = e.clientX;
      _pointerDownY = e.clientY;
    });

    canvas.addEventListener('pointerup', e => {
      // Only treat as a click if pointer moved < 5px (not a drag)
      const dx = e.clientX - _pointerDownX;
      const dy = e.clientY - _pointerDownY;
      if (Math.sqrt(dx*dx + dy*dy) > 5) return;

      _mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
      _mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(_mouse, camera);

      const moonHit  = raycaster.intersectObject(moonMesh);
      const earthHit = raycaster.intersectObject(earthMesh);

      if (moonHit.length > 0) {
        focusTarget = 'moon';
        focusNameEl.textContent = 'Moon';
        controls.minDistance = 0.65;
        setSpeedButtonsVisible(false);
      } else if (earthHit.length > 0) {
        focusTarget = 'earth';
        focusNameEl.textContent = 'Earth';
        controls.minDistance = 2.5;
        setSpeedButtonsVisible(true);
      }
    });

    // ── Cached DOM references (avoid per-frame getElementById) ───────────────
    const hudEls = {
      time:       document.getElementById('hud-time'),
      liveBadge:  document.getElementById('live-badge'),
      dist:       document.getElementById('hud-dist'),
      phase:      document.getElementById('hud-phase'),
      fullmoonIn: document.getElementById('hud-fullmoon-in'),
      fullmoon:   document.getElementById('hud-fullmoon'),
      speed:      document.getElementById('hud-speed'),
      lib:        document.getElementById('hud-lib'),
      lon:        document.getElementById('hud-lon'),
      lat:        document.getElementById('hud-lat'),
    };
    const focusNameEl    = document.getElementById('focus-name');

    // ── Per-frame update ─────────────────────────────────────────────────────
    function updateHUD(date, moonState) {
      const iso = date.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
      hudEls.time.textContent    = iso;
      hudEls.liveBadge.className = timeController.isLive ? '' : 'hidden';
      hudEls.dist.textContent    = moonState.distance.toFixed(0) + ' km';
      hudEls.phase.textContent   = moonState.phaseIcon + ' ' + moonState.phaseName;
      const nextFull = getNextFullMoon(date);
      if (nextFull) {
        const diffMs   = nextFull.getTime() - date.getTime();
        const diffDays = Math.floor(diffMs / 86400000);
        const diffHrs  = Math.floor((diffMs % 86400000) / 3600000);
        const fullStr  = nextFull.toUTCString().replace(' GMT', ' UTC')
          .replace(/:\d\d /, ' ');           // trim seconds for brevity
        hudEls.fullmoon.textContent   = fullStr;
        hudEls.fullmoonIn.textContent = diffMs > 0
          ? 'in ' + diffDays + 'd ' + diffHrs + 'h'
          : 'now / passed';
      }
      hudEls.speed.textContent = moonState.speed.toFixed(3) + ' km/s';
      hudEls.lib.textContent   = (moonState.libration >= 0 ? '+' : '') +
        moonState.libration.toFixed(2) + '\u00b0';
      hudEls.lon.textContent   = moonState.lon.toFixed(2) + '\u00b0';
      hudEls.lat.textContent   = (moonState.lat >= 0 ? '+' : '') + moonState.lat.toFixed(2) + '\u00b0';
    }

    // ── Coords toggle ────────────────────────────────────────────────────────
    (function() {
      const toggle = document.getElementById('coords-toggle');
      const panel  = document.getElementById('hud-coords');
      toggle.addEventListener('click', () => {
        const open = panel.classList.toggle('visible');
        toggle.textContent = (open ? '\u25bc' : '\u25ba') + ' Ecliptic Coords';
      });
    })();

    // ── Camera fly-to ─────────────────────────────────────────────────────────
    const cameraAnim = {
      active: false, duration: 1800, startTime: 0,
      startPos:    new THREE.Vector3(),
      endPos:      new THREE.Vector3(),
      startTarget: new THREE.Vector3(),
      endTarget:   new THREE.Vector3(),
    };

    function flyTo(endPos, endTarget, duration = 1800) {
      cameraAnim.startPos.copy(camera.position);
      cameraAnim.endPos.copy(endPos);
      cameraAnim.startTarget.copy(controls.target);
      cameraAnim.endTarget.copy(endTarget);
      cameraAnim.startTime = Date.now();
      cameraAnim.duration  = duration;
      cameraAnim.active    = true;
      controls.enabled     = false;
    }

    // ── Facts / Lessons ───────────────────────────────────────────────────────
    let _lastSunDir = new THREE.Vector3(1, 0, 0);

    const LESSONS = [
      {
        title: 'Axial Tilt',
        body:  "Earth's axis tilts 23.44° from perpendicular to its orbit. This — not our distance from the Sun — causes the seasons. Notice the poles don't sit straight up and down. When the Northern Hemisphere tilts toward the Sun it's summer there and winter in the South.",
        getCamera() {
          return { pos: new THREE.Vector3(9, 4, 6), target: new THREE.Vector3(0, 0, 0) };
        },
      },
      {
        title: 'Tidal Locking',
        body:  "The Moon always shows the same face to Earth. Earth's gravity gradually slowed the Moon's rotation over billions of years until its spin period matched its 27.3-day orbit exactly. The far side was completely unknown until Soviet spacecraft photographed it in 1959.",
        getCamera() {
          const mp   = moonMesh.position.clone();
          const dir  = mp.clone().normalize();
          const perp = new THREE.Vector3().crossVectors(dir, new THREE.Vector3(0, 1, 0)).normalize();
          // Position past the Moon, offset sideways and up — looking back toward Earth
          const pos = mp.clone()
            .addScaledVector(dir,  3.5)
            .addScaledVector(perp, 1.5)
            .add(new THREE.Vector3(0, 3, 0));
          return { pos, target: new THREE.Vector3(0, 0.5, 0) };
        },
      },
      {
        title: 'The Terminator',
        body:  "The line dividing Earth's lit and dark sides is called the terminator. It's not a sharp edge — a gradual twilight zone (the penumbra) softens the boundary. Observers standing on the terminator see the Sun exactly on the horizon.",
        getCamera() {
          const perp = new THREE.Vector3().crossVectors(_lastSunDir, new THREE.Vector3(0, 1, 0)).normalize();
          return {
            pos:    perp.multiplyScalar(8).add(new THREE.Vector3(0, 3, 0)),
            target: new THREE.Vector3(0, 0, 0),
          };
        },
      },
      {
        title: 'Earth–Moon Distance',
        body:  "The Moon averages 384,400 km away — about 30 Earth-diameters. If Earth were a basketball, the Moon would be a tennis ball 7 meters away. Distance varies from ~362,000 km (perigee) to ~405,500 km (apogee), which creates the noticeable size difference between supermoons and micromoons.",
        getCamera() {
          const mp  = moonMesh.position.clone();
          const mid = mp.clone().multiplyScalar(0.45);
          return {
            pos:    mid.clone().add(new THREE.Vector3(0, 22, 30)),
            target: mid,
          };
        },
      },
      {
        title: 'City Lights',
        body:  "The glow on Earth's dark side is real NASA data — the 2016 'Black Marble' composite from the Suomi NPP satellite. The brightest clusters are Western Europe, the US East Coast, Japan, and India's Ganges Plain. In remote oceans you can spot fishing fleets using bright lights to attract squid.",
        getCamera() {
          const darkDir = _lastSunDir.clone().negate().normalize();
          return {
            pos:    darkDir.multiplyScalar(7).add(new THREE.Vector3(0, 2, 0)),
            target: new THREE.Vector3(0, 0, 0),
          };
        },
      },
    ];

    const lessonState = { active: false, index: 0, savedIsLive: false, savedMult: 1, savedPaused: false, savedSimTime: 0 };
    const lessonCardEl    = document.getElementById('lesson-card');
    const lessonTitleEl   = document.getElementById('lesson-title');
    const lessonBodyEl    = document.getElementById('lesson-body');
    const lessonCounterEl = document.getElementById('lesson-counter');

    function showLesson(idx) {
      const lesson = LESSONS[idx];
      lessonState.index = idx;
      lessonCounterEl.textContent = (idx + 1) + ' / ' + LESSONS.length;
      lessonTitleEl.textContent   = lesson.title;
      lessonBodyEl.textContent    = lesson.body;
      document.getElementById('lesson-prev').style.opacity = idx === 0 ? '0.3' : '1';
      document.getElementById('lesson-next').style.opacity = idx === LESSONS.length - 1 ? '0.3' : '1';
      const cam = lesson.getCamera();
      flyTo(cam.pos, cam.target);
    }

    function openLessons() {
      if (lessonState.active) return;
      lessonState.active      = true;
      lessonState.savedIsLive = timeController.isLive;
      lessonState.savedMult   = timeController.multiplier;
      lessonState.savedPaused = timeController.paused;
      lessonState.savedSimTime = timeController.simTime;
      if (!timeController.paused) {
        _prePauseLabel = speedLabel.textContent;
        timeController.isLive    = false;
        timeController.paused    = true;
        timeController._lastWall = Date.now();
        setActiveBtn(false);
        document.getElementById('btn-pause').classList.add('active');
        speedLabel.textContent = '\u23f8 Paused';
      }
      lessonCardEl.classList.add('visible');
      document.getElementById('btn-facts').classList.add('active');
      showLesson(0);
    }

    function closeLessons() {
      lessonState.active = false;
      _lerpTarget.copy(controls.target); // start lerp from current position, not Earth origin
      lessonCardEl.classList.remove('visible');
      document.getElementById('btn-facts').classList.remove('active');
      controls.enabled = true;
      if (lessonState.savedIsLive) {
        timeController.goLive();
        speedLabel.textContent = 'LIVE \u2014 1\u00d7';
        setActiveBtn(true);
      } else {
        timeController.simTime    = lessonState.savedSimTime;
        timeController.multiplier = lessonState.savedMult;
        timeController.isLive     = false;
        timeController.paused     = lessonState.savedPaused;
        timeController._lastWall  = Date.now();
      }
    }

    document.getElementById('btn-facts').addEventListener('click', openLessons);
    document.getElementById('lesson-close').addEventListener('click', closeLessons);
    document.getElementById('lesson-prev').addEventListener('click', () => {
      if (lessonState.index > 0) showLesson(lessonState.index - 1);
    });
    document.getElementById('lesson-next').addEventListener('click', () => {
      if (lessonState.index < LESSONS.length - 1) showLesson(lessonState.index + 1);
    });

    function animate() {
      requestAnimationFrame(animate);

      const simDate   = timeController.tick();
      const moonState = astronomyEngine.getMoonState(simDate);

      // Rebuild orbit ring: max ~10×/sec wall time at high speed, every 6 sim-hours otherwise
      const wallNow   = Date.now();
      const highSpeed = Math.abs(timeController.multiplier) >= 1000;
      const orbitDue  = highSpeed
        ? (wallNow - _lastOrbitWallMs) > 100
        : Math.abs(simDate.getTime() - _lastOrbitUpdate) > 6 * 3600 * 1000;
      if (orbitDue) {
        rebuildOrbitRing(simDate);
        _lastOrbitUpdate = simDate.getTime();
        _lastOrbitWallMs = wallNow;
      }

      // Sun light direction (sunDir pre-computed inside getMoonState — no extra call needed)
      sunLight.position.copy(moonState.sunDir).multiplyScalar(1000);
      nightMat.uniforms.sunDir.value.copy(moonState.sunDir);
      _lastSunDir.copy(moonState.sunDir);

      // Earth rotation: use GMST so the terminator matches real-world time
      const JD_earth = astronomyEngine.julianDay(simDate);
      const GMST_deg = ((280.46061837 + 360.98564736629 * (JD_earth - 2451545.0)) % 360 + 360) % 360;
      earthMesh.rotation.y = GMST_deg * Math.PI / 180;

      // Moon position + tidal lock + libration
      updateMoon(moonState);

      // HUD
      updateHUD(simDate, moonState);

      // Camera fly-to (lessons) or normal target lerp
      if (cameraAnim.active) {
        const t    = Math.min((Date.now() - cameraAnim.startTime) / cameraAnim.duration, 1);
        const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
        camera.position.lerpVectors(cameraAnim.startPos, cameraAnim.endPos, ease);
        controls.target.lerpVectors(cameraAnim.startTarget, cameraAnim.endTarget, ease);
        camera.lookAt(controls.target);
        if (t >= 1) {
          cameraAnim.active = false;
          controls.enabled  = true;
          controls.update();
        }
      } else {
        if (!lessonState.active) {
          const dest = focusTarget === 'moon'
            ? _moonTarget.copy(moonMesh.position)
            : _earthOrigin;
          _lerpTarget.lerp(dest, 0.06);
          controls.target.copy(_lerpTarget);
        }
        controls.update();
      }
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
